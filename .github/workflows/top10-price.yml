name: Top10 Stock Price to Telegram

on:
  schedule:
    - cron: "0 */2 * * *"   # 매 2시간마다 (UTC 기준, 0시/2시/4시.../22시)
  workflow_dispatch: {}

jobs:
  send-top10:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: TOP10 가격 수집 및 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fetch_top10_prices.py
