name: Top10 Stock Price to Telegram

on:
  schedule:
    - cron: "0 0 * * 1-5"    # 09:00 KST - 개장 직후
    - cron: "0 2 * * 1-5"    # 11:00 KST - 오전 중반
    - cron: "0 4 * * 1-5"    # 13:00 KST - 오후 개장
    - cron: "0 6 * * 1-5"    # 15:00 KST - 마감 전
    - cron: "30 6 * * 1-5"   # 15:30 KST - 장 마감
  workflow_dispatch: {}

jobs:
  send-top10:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: TOP20 가격 수집 및 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fetch_top10_prices.py
