name: Daily Market News to Telegram (Free)

on:
  schedule:
    - cron: "30 23 * * *"   # 08:30 KST - 장 시작 전 (미국 마감/공시/예상 테마)
    - cron: "30 0 * * *"    # 09:30 KST - 장 초반 특징주
    - cron: "0 4 * * *"     # 13:00 KST - 오전장 요약/오후장 전망
    - cron: "40 6 * * *"    # 15:40 KST - 장 마감 시황
  workflow_dispatch: {}

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 뉴스 수집 및 전송 실행 (AI 미사용, 무료)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fetch_and_send_free.py
