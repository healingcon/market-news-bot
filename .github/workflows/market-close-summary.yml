name: Market Close Summary to Telegram

on:
  schedule:
    - cron: "40 6 * * 1-5"   # 평일 15:40 KST (한국 장 마감 후)
  workflow_dispatch: {}

jobs:
  send-summary:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 마감 시황 요약 및 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python market_close_summary.py
